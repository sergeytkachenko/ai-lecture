name: Sync 1Password Secrets to Jenkins

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  sync-credentials:
    name: Sync credentials from 1Password to Jenkins
    runs-on: ubuntu-latest
    environment: default

    steps:
      - name: Load Jenkins connection from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          JENKINS_URL: op://k3s-infrastructure/jenkins-admin/website
          JENKINS_USER: op://k3s-infrastructure/jenkins-admin/username
          JENKINS_TOKEN: op://k3s-infrastructure/jenkins-admin/token

      - name: Load application secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          # Database
          AI_LECTURE_DB_USERNAME: op://k3s-infrastructure/ai-lecture-db/username
          AI_LECTURE_DB_PASSWORD: op://k3s-infrastructure/ai-lecture-db/password
          AI_LECTURE_DB_DATABASE: op://k3s-infrastructure/ai-lecture-db/database
          # Docker Hub
          AI_LECTURE_DOCKERHUB_USERNAME: op://k3s-infrastructure/ai-lecture-dockerhub/username
          AI_LECTURE_DOCKERHUB_TOKEN: op://k3s-infrastructure/ai-lecture-dockerhub/token
          # Server
          AI_LECTURE_SERVER_IP: op://k3s-infrastructure/ai-lecture-server/public_ip

      - name: Get Jenkins CSRF crumb
        id: crumb
        run: |
          CRUMB_JSON=$(curl -sf -u "${JENKINS_USER}:${JENKINS_TOKEN}" \
            "${JENKINS_URL}/crumbIssuer/api/json")
          CRUMB=$(echo "$CRUMB_JSON" | jq -r '.crumb')
          CRUMB_FIELD=$(echo "$CRUMB_JSON" | jq -r '.crumbRequestField')
          echo "crumb=${CRUMB}" >> "$GITHUB_OUTPUT"
          echo "field=${CRUMB_FIELD}" >> "$GITHUB_OUTPUT"

      - name: Sync credentials to Jenkins
        run: |
          set -e

          CRUMB="${{ steps.crumb.outputs.crumb }}"
          CRUMB_FIELD="${{ steps.crumb.outputs.field }}"

          declare -A CREDENTIALS
          CREDENTIALS[ai-lecture-db-username]="${AI_LECTURE_DB_USERNAME}"
          CREDENTIALS[ai-lecture-db-password]="${AI_LECTURE_DB_PASSWORD}"
          CREDENTIALS[ai-lecture-db-database]="${AI_LECTURE_DB_DATABASE}"
          CREDENTIALS[ai-lecture-dockerhub-username]="${AI_LECTURE_DOCKERHUB_USERNAME}"
          CREDENTIALS[ai-lecture-dockerhub-token]="${AI_LECTURE_DOCKERHUB_TOKEN}"
          CREDENTIALS[ai-lecture-server-ip]="${AI_LECTURE_SERVER_IP}"

          SYNCED=0
          FAILED=0

          for CRED_ID in "${!CREDENTIALS[@]}"; do
            SECRET_VALUE="${CREDENTIALS[$CRED_ID]}"

            if [ -z "${SECRET_VALUE}" ]; then
              echo "WARNING: Empty value for ${CRED_ID}, skipping"
              FAILED=$((FAILED + 1))
              continue
            fi

            # Check if credential exists
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -u "${JENKINS_USER}:${JENKINS_TOKEN}" \
              "${JENKINS_URL}/credentials/store/system/domain/_/credential/${CRED_ID}/api/json")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Updating credential: ${CRED_ID}"
              PAYLOAD=$(cat <<XMLEOF
          <org.jenkinsci.plugins.plaincredentials.impl.StringCredentialsImpl>
            <scope>GLOBAL</scope>
            <id>${CRED_ID}</id>
            <description>Synced from 1Password ($(date -u +%Y-%m-%dT%H:%M:%SZ))</description>
            <secret>${SECRET_VALUE}</secret>
          </org.jenkinsci.plugins.plaincredentials.impl.StringCredentialsImpl>
          XMLEOF
              )

              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                -u "${JENKINS_USER}:${JENKINS_TOKEN}" \
                -H "${CRUMB_FIELD}: ${CRUMB}" \
                -H "Content-Type: application/xml" \
                -d "${PAYLOAD}" \
                "${JENKINS_URL}/credentials/store/system/domain/_/credential/${CRED_ID}/config.xml")

              if [ "$HTTP_CODE" = "200" ]; then
                echo "  Updated successfully"
                SYNCED=$((SYNCED + 1))
              else
                echo "  Failed to update (HTTP ${HTTP_CODE})"
                FAILED=$((FAILED + 1))
              fi
            else
              echo "Creating credential: ${CRED_ID}"
              PAYLOAD=$(cat <<XMLEOF
          <org.jenkinsci.plugins.plaincredentials.impl.StringCredentialsImpl>
            <scope>GLOBAL</scope>
            <id>${CRED_ID}</id>
            <description>Synced from 1Password ($(date -u +%Y-%m-%dT%H:%M:%SZ))</description>
            <secret>${SECRET_VALUE}</secret>
          </org.jenkinsci.plugins.plaincredentials.impl.StringCredentialsImpl>
          XMLEOF
              )

              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                -u "${JENKINS_USER}:${JENKINS_TOKEN}" \
                -H "${CRUMB_FIELD}: ${CRUMB}" \
                -H "Content-Type: application/xml" \
                -d "${PAYLOAD}" \
                "${JENKINS_URL}/credentials/store/system/domain/_/createCredentials")

              if [ "$HTTP_CODE" = "200" ]; then
                echo "  Created successfully"
                SYNCED=$((SYNCED + 1))
              else
                echo "  Failed to create (HTTP ${HTTP_CODE})"
                FAILED=$((FAILED + 1))
              fi
            fi
          done

          echo ""
          echo "=========================================="
          echo "Sync complete: ${SYNCED} synced, ${FAILED} failed"
          echo "=========================================="

          if [ "$FAILED" -gt 0 ]; then
            exit 1
          fi
