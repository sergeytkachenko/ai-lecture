apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-lecture-api
  namespace: ai-lecture
  labels:
    app: ai-lecture-api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ai-lecture-api
  template:
    metadata:
      labels:
        app: ai-lecture-api
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: ai-lecture-api
          image: registry.local:5000/ai-lecture-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: ai-lecture-api-config
            - secretRef:
                name: ai-lecture-api-secrets
                optional: true
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
