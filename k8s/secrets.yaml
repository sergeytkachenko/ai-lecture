# Secrets are managed by 1Password and injected dynamically by the Jenkinsfile.
# The Jenkins pipeline resolves op:// references from vault "k3s-infrastructure"
# and creates k8s secrets at deploy time.
#
# Required 1Password items (vault: k3s-infrastructure):
#   - ai-lecture-db     : username, password, database
#   - ai-lecture-server : public_ip (Hetzner server IP)
#
# See Jenkinsfile "Create Secrets" stage for the full list of injected fields.
