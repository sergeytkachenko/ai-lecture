apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-lecture-slides
  namespace: ai-lecture
  labels:
    app: ai-lecture-slides
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ai-lecture-slides
  template:
    metadata:
      labels:
        app: ai-lecture-slides
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: ai-lecture-slides
          image: registry.local:5000/ai-lecture-slides:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
