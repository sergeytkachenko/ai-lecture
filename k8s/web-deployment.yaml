apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-lecture-web
  namespace: ai-lecture
  labels:
    app: ai-lecture-web
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ai-lecture-web
  template:
    metadata:
      labels:
        app: ai-lecture-web
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: ai-lecture-web
          image: registry.local:5000/ai-lecture-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          env:
            - name: API_URL
              value: "http://ai-lecture-api.ai-lecture.svc.cluster.local:80"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
